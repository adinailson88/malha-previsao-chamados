name: Previsao global de chamados

concurrency:
  group: malha-previsao-chamados
  cancel-in-progress: false

on:
  schedule:
    - cron: '30 6 * * *'
  workflow_dispatch:

jobs:
  previsao_chamados:
    runs-on: ubuntu-latest
    timeout-minutes: 600

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r execucao_offline/requirements.txt

      - name: Reconstruir credenciais Google
        env:
          AUTENTICACAO_GOOGLE: ${{ secrets.AUTENTICACAO_GOOGLE }}
        run: |
          echo "$AUTENTICACAO_GOOGLE" | base64 -d > autenticacao_google.json
          echo "{}" > chaves_api.json

      - name: Executar previsao de chamados
        run: python motor_previsao_chamados.py --apenas-previsao-chamados
